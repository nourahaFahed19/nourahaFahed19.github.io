<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norah Jewelry — Timeless Elegance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
:root{
--cream:#FAF8F4;--gold:#C9A84C;--charcoal:#2A2520;--gold-light:#E8D9A0;--gold-dark:#A88A2E;
--bg:#FAF8F4;--text:#2A2520;--text-light:#6B6560;--border:#E5E0D8;--card-bg:#FFFFFF;
--serif:'Cormorant Garamond',Georgia,serif;--sans:'Jost','Segoe UI',sans-serif;
--shadow:0 4px 24px rgba(42,37,32,.08);--shadow-lg:0 12px 48px rgba(42,37,32,.12);
--radius:12px;--transition:.35s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--cream);color:var(--charcoal);line-height:1.6;overflow-x:hidden;font-weight:400}
h1,h2,h3,h4,h5{font-family:var(--serif);font-weight:500;line-height:1.2}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:var(--sans);border:none;background:none}
input,textarea,select{font-family:var(--sans);outline:none}
img{max-width:100%;display:block}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

/* LOADER */
#appLoader{position:fixed;inset:0;z-index:10000;background:var(--cream);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .5s}
#appLoader.hidden{opacity:0;pointer-events:none}
.loader-logo{font-family:var(--serif);font-size:36px;font-weight:300;letter-spacing:6px;color:var(--charcoal);text-transform:uppercase}
.loader-bar{width:180px;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.loader-bar::after{content:'';display:block;width:40%;height:100%;background:var(--gold);border-radius:2px;animation:loaderSlide 1.2s ease-in-out infinite}
@keyframes loaderSlide{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}

/* TOAST */
#toastContainer{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{pointer-events:auto;padding:14px 22px;border-radius:10px;font-size:14px;font-weight:500;color:#fff;background:var(--charcoal);box-shadow:var(--shadow-lg);animation:toastIn .4s ease,toastOut .4s ease 3s forwards;max-width:340px}
.toast.gold{background:var(--gold)}
.toast.red{background:#C0392B}
@keyframes toastIn{from{transform:translateX(120px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastOut{to{transform:translateX(120px);opacity:0}}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(250,248,244,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);transition:box-shadow .3s}
.nav.scrolled{box-shadow:0 2px 20px rgba(42,37,32,.08)}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 32px;height:68px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-family:var(--serif);font-size:22px;font-weight:400;letter-spacing:4px;text-transform:uppercase;color:var(--charcoal)}
.nav-brand span{color:var(--gold)}
.nav-links{display:flex;align-items:center;gap:28px}
.nav-links a{font-size:13px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--text-light);transition:color var(--transition);position:relative}
.nav-links a:hover{color:var(--gold)}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1.5px;background:var(--gold);transition:width var(--transition)}
.nav-links a:hover::after{width:100%}
.nav-icons{display:flex;align-items:center;gap:16px}
.nav-icon-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background var(--transition);position:relative}
.nav-icon-btn:hover{background:rgba(201,168,76,.1)}
.nav-icon-btn svg{width:20px;height:20px;stroke:var(--charcoal);fill:none;stroke-width:1.8}
.cart-count{position:absolute;top:2px;right:2px;background:var(--gold);color:#fff;font-size:10px;font-weight:600;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;display:none}
.cart-count.show{display:flex}
.hamburger{display:none;flex-direction:column;gap:5px;padding:8px}
.hamburger span{width:22px;height:1.5px;background:var(--charcoal);transition:var(--transition)}

/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;padding:120px 32px 80px;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--cream) 0%,#F5F0E8 50%,#EDE6D8 100%)}
.hero-rings{position:absolute;top:50%;right:8%;transform:translateY(-50%)}
.hero-ring{border:1.5px solid var(--gold-light);border-radius:50%;position:absolute;opacity:.4;animation:ringFloat 8s ease-in-out infinite}
.hero-ring:nth-child(1){width:300px;height:300px;top:-150px;right:0}
.hero-ring:nth-child(2){width:220px;height:220px;top:-60px;right:80px;animation-delay:2s}
.hero-ring:nth-child(3){width:160px;height:160px;top:20px;right:20px;animation-delay:4s}
@keyframes ringFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.hero-content{max-width:1280px;margin:0 auto;width:100%;position:relative;z-index:2}
.hero-sub{font-size:13px;font-weight:500;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
.hero h1{font-size:clamp(42px,6vw,80px);font-weight:300;line-height:1.1;margin-bottom:24px;color:var(--charcoal)}
.hero h1 em{font-style:italic;color:var(--gold);font-weight:400}
.hero-desc{font-size:17px;color:var(--text-light);max-width:500px;margin-bottom:40px;line-height:1.7}
.hero-btns{display:flex;gap:16px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:50px;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;transition:all var(--transition)}
.btn-gold{background:var(--gold);color:#fff}
.btn-gold:hover{background:var(--gold-dark);transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.3)}
.btn-outline{border:1.5px solid var(--charcoal);color:var(--charcoal)}
.btn-outline:hover{background:var(--charcoal);color:#fff;transform:translateY(-2px)}
.btn-sm{padding:10px 22px;font-size:12px}

/* SECTION */
.section{padding:100px 32px}
.section-header{text-align:center;margin-bottom:60px}
.section-sub{font-size:12px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.section-title{font-size:clamp(32px,4vw,48px);font-weight:400;color:var(--charcoal)}
.gold-divider{width:60px;height:2px;background:var(--gold);margin:20px auto 0;border-radius:2px}

/* SEARCH */
.search-wrap{max-width:500px;margin:0 auto 60px;position:relative}
.search-wrap input{width:100%;padding:14px 20px 14px 48px;border:1.5px solid var(--border);border-radius:50px;font-size:15px;background:#fff;transition:border-color var(--transition)}
.search-wrap input:focus{border-color:var(--gold)}
.search-wrap svg{position:absolute;left:18px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--text-light);fill:none;stroke-width:2}

/* PRODUCTS GRID */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:28px;max-width:1280px;margin:0 auto}
.product-card{background:var(--card-bg);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:all var(--transition);cursor:pointer;position:relative}
.product-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg)}
.product-card-img{position:relative;overflow:hidden;aspect-ratio:1/1.1}
.product-card-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease}
.product-card:hover .product-card-img img{transform:scale(1.08)}
.product-card-overlay{position:absolute;inset:0;background:rgba(42,37,32,.3);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--transition)}
.product-card:hover .product-card-overlay{opacity:1}
.product-card-overlay .btn{font-size:11px;padding:10px 24px}
.product-badge{position:absolute;top:14px;left:14px;padding:5px 14px;border-radius:50px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#fff;z-index:2}
.product-badge.New{background:var(--gold)}
.product-badge.Bestseller{background:#2A2520}
.product-badge.Limited{background:#8B4513}
.quick-add{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:50%;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;z-index:2;transition:all var(--transition);opacity:0}
.product-card:hover .quick-add{opacity:1}
.quick-add:hover{background:var(--gold);color:#fff}
.quick-add svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5}
.product-card-info{padding:20px}
.product-card-info h3{font-size:20px;font-weight:500;margin-bottom:4px}
.product-card-info .material{font-size:13px;color:var(--text-light);margin-bottom:8px}
.product-card-info .stars{display:flex;align-items:center;gap:4px;margin-bottom:8px}
.product-card-info .stars svg{width:14px;height:14px;fill:var(--gold);stroke:none}
.product-card-info .stars span{font-size:12px;color:var(--text-light)}
.product-card-info .price{font-size:20px;font-weight:600;color:var(--gold);font-family:var(--sans)}

/* ABOUT */
.about-section{background:var(--charcoal);color:#fff;position:relative;overflow:hidden}
.about-section::before{content:'';position:absolute;top:-50%;right:-10%;width:500px;height:500px;border:1px solid rgba(201,168,76,.15);border-radius:50%}
.about-inner{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.about-text .section-sub{text-align:left;margin-bottom:12px}
.about-text .section-title{text-align:left;color:#fff;margin-bottom:24px}
.about-text p{color:rgba(255,255,255,.7);line-height:1.8;margin-bottom:20px;font-size:15px}
.about-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
.stat-card{text-align:center;padding:28px 20px;background:rgba(255,255,255,.05);border-radius:var(--radius);border:1px solid rgba(201,168,76,.2)}
.stat-card .num{font-family:var(--serif);font-size:36px;font-weight:400;color:var(--gold);margin-bottom:4px}
.stat-card .label{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5)}

/* CONTACT */
.contact-inner{max-width:640px;margin:0 auto}
.contact-form{display:flex;flex-direction:column;gap:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-light)}
.form-group input,.form-group textarea,.form-group select{padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:#fff;transition:border-color var(--transition)}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--gold)}
.form-group textarea{resize:vertical;min-height:120px}

/* FOOTER */
.footer{background:var(--charcoal);color:#fff;padding:60px 32px 30px}
.footer-inner{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;margin-bottom:40px}
.footer-brand{font-family:var(--serif);font-size:22px;letter-spacing:4px;text-transform:uppercase;margin-bottom:16px}
.footer-brand span{color:var(--gold)}
.footer p{color:rgba(255,255,255,.5);font-size:13px;line-height:1.7}
.footer h4{font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;color:var(--gold)}
.footer-links a{display:block;color:rgba(255,255,255,.5);font-size:13px;margin-bottom:10px;transition:color var(--transition)}
.footer-links a:hover{color:var(--gold)}
.footer-bottom{border-top:1px solid rgba(255,255,255,.1);padding-top:24px;text-align:center;font-size:12px;color:rgba(255,255,255,.3)}

/* CART DRAWER */
.cart-overlay{position:fixed;inset:0;background:rgba(42,37,32,.4);z-index:2000;opacity:0;pointer-events:none;transition:opacity .3s}
.cart-overlay.open{opacity:1;pointer-events:auto}
.cart-drawer{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:95vw;background:#fff;z-index:2001;transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.cart-drawer.open{transform:translateX(0)}
.cart-header{padding:24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.cart-header h2{font-size:22px;font-weight:500}
.cart-close{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background var(--transition)}
.cart-close:hover{background:rgba(0,0,0,.06)}
.cart-close svg{width:20px;height:20px;stroke:var(--charcoal);fill:none;stroke-width:2}
.cart-body{flex:1;overflow-y:auto;padding:20px 24px}
.cart-empty{text-align:center;padding:60px 20px;color:var(--text-light)}
.cart-item{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid var(--border)}
.cart-item-img{width:72px;height:72px;border-radius:8px;overflow:hidden;flex-shrink:0}
.cart-item-img img{width:100%;height:100%;object-fit:cover}
.cart-item-info{flex:1}
.cart-item-info h4{font-size:15px;font-weight:500;margin-bottom:2px}
.cart-item-info .material{font-size:12px;color:var(--text-light);margin-bottom:8px}
.cart-item-info .price{font-size:15px;font-weight:600;color:var(--gold)}
.cart-item-actions{display:flex;align-items:center;gap:8px;margin-top:8px}
.qty-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;transition:all var(--transition)}
.qty-btn:hover{border-color:var(--gold);color:var(--gold)}
.qty-val{font-size:14px;font-weight:600;min-width:24px;text-align:center}
.cart-item-remove{margin-left:auto;color:var(--text-light);font-size:12px;transition:color var(--transition)}
.cart-item-remove:hover{color:#C0392B}
.cart-footer{padding:24px;border-top:1px solid var(--border)}
.cart-subtotal{display:flex;justify-content:space-between;margin-bottom:16px;font-size:16px;font-weight:600}
.cart-subtotal span:last-child{color:var(--gold);font-size:20px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(42,37,32,.5);z-index:3000;opacity:0;pointer-events:none;transition:opacity .3s;display:flex;align-items:center;justify-content:center;padding:24px}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:#fff;border-radius:16px;max-width:900px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);transform:scale(.95);transition:transform .3s;position:relative}
.modal-overlay.open .modal{transform:scale(1)}
.modal-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;z-index:2;transition:background var(--transition)}
.modal-close:hover{background:#fff}
.modal-close svg{width:18px;height:18px;stroke:var(--charcoal);fill:none;stroke-width:2}
.modal-body{display:grid;grid-template-columns:1fr 1fr;gap:0}
.modal-img{aspect-ratio:1;overflow:hidden}
.modal-img img{width:100%;height:100%;object-fit:cover}
.modal-info{padding:36px}
.modal-info .cat{font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.modal-info h2{font-size:28px;font-weight:500;margin-bottom:4px}
.modal-info .material{font-size:14px;color:var(--text-light);margin-bottom:12px}
.modal-info .stars{display:flex;align-items:center;gap:4px;margin-bottom:16px}
.modal-info .stars svg{width:16px;height:16px;fill:var(--gold);stroke:none}
.modal-info .stars span{font-size:13px;color:var(--text-light);margin-left:4px}
.modal-info .price{font-size:28px;font-weight:600;color:var(--gold);margin-bottom:16px}
.modal-info .desc{font-size:14px;color:var(--text-light);line-height:1.7;margin-bottom:20px}
.modal-details{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;font-size:13px}
.modal-details div{padding:8px 12px;background:var(--cream);border-radius:6px}
.modal-details div strong{font-weight:600}
.modal-qty{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.modal-qty label{font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.modal-btns{display:flex;gap:12px;flex-wrap:wrap}
.stock-status{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;margin-bottom:16px}
.stock-status .dot{width:8px;height:8px;border-radius:50%}
.stock-status .dot.in{background:#27AE60}
.stock-status .dot.out{background:#C0392B}
.modal-reviews{padding:36px;border-top:1px solid var(--border);grid-column:1/-1}
.modal-reviews h3{font-size:22px;font-weight:500;margin-bottom:20px}
.review-summary{display:flex;gap:32px;margin-bottom:24px;align-items:flex-start}
.review-avg{text-align:center;padding:20px}
.review-avg .big{font-family:var(--serif);font-size:48px;font-weight:400;color:var(--charcoal)}
.review-avg .stars-row{display:flex;gap:2px;justify-content:center;margin:4px 0}
.review-avg .stars-row svg{width:16px;height:16px;fill:var(--gold)}
.review-avg .count{font-size:13px;color:var(--text-light)}
.review-bars{flex:1}
.review-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px}
.review-bar-row span:first-child{width:16px;text-align:right;font-weight:600}
.review-bar-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.review-bar-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .5s}
.review-bar-row span:last-child{width:28px;color:var(--text-light);font-size:12px}
.review-card{padding:16px;border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
.review-card-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.review-card-header .name{font-weight:600;font-size:14px}
.review-card-header .verified{font-size:11px;color:#27AE60;font-weight:500}
.review-card-header .date{margin-left:auto;font-size:12px;color:var(--text-light)}
.review-card .stars-row{display:flex;gap:2px;margin-bottom:6px}
.review-card .stars-row svg{width:14px;height:14px;fill:var(--gold)}
.review-card p{font-size:14px;color:var(--text-light);line-height:1.6}
.review-form{margin-top:24px;padding:20px;background:var(--cream);border-radius:10px}
.review-form h4{font-size:16px;font-weight:500;margin-bottom:12px}
.star-picker{display:flex;gap:4px;margin-bottom:12px}
.star-picker button{background:none;padding:2px}
.star-picker button svg{width:24px;height:24px;fill:var(--border);stroke:none;transition:fill .2s}
.star-picker button.active svg,.star-picker button:hover svg{fill:var(--gold)}
.review-form textarea{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;min-height:80px;resize:vertical;margin-bottom:12px}
.review-form textarea:focus{border-color:var(--gold)}

/* AUTH PAGES */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;background:var(--cream)}
.auth-card{background:#fff;border-radius:16px;padding:48px;max-width:440px;width:100%;box-shadow:var(--shadow-lg)}
.auth-card .logo{font-family:var(--serif);font-size:24px;letter-spacing:4px;text-transform:uppercase;text-align:center;margin-bottom:8px}
.auth-card .logo span{color:var(--gold)}
.auth-card h2{font-size:26px;font-weight:400;text-align:center;margin-bottom:24px}
.auth-card .subtitle{text-align:center;color:var(--text-light);font-size:14px;margin-bottom:24px}
.auth-error{background:#FEF2F2;color:#C0392B;padding:10px 16px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.auth-form{display:flex;flex-direction:column;gap:14px}
.auth-form .form-group input{width:100%}
.auth-switch{text-align:center;margin-top:20px;font-size:14px;color:var(--text-light)}
.auth-switch a{color:var(--gold);font-weight:600}

/* DASHBOARD */
.dash-page{min-height:100vh;background:var(--cream)}
.dash-header{background:#fff;border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px}
.dash-header .logo{font-family:var(--serif);font-size:20px;letter-spacing:3px;text-transform:uppercase}
.dash-header .logo span{color:var(--gold)}
.dash-header-right{display:flex;align-items:center;gap:16px}
.dash-user{font-size:14px;font-weight:500}
.dash-layout{display:flex;min-height:calc(100vh - 64px)}
.dash-sidebar{width:240px;background:#fff;border-right:1px solid var(--border);padding:24px 0;flex-shrink:0}
.dash-nav a{display:flex;align-items:center;gap:12px;padding:12px 24px;font-size:14px;font-weight:500;color:var(--text-light);transition:all var(--transition)}
.dash-nav a:hover,.dash-nav a.active{color:var(--gold);background:rgba(201,168,76,.06)}
.dash-nav a.active{border-right:3px solid var(--gold)}
.dash-nav a svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}
.dash-content{flex:1;padding:32px;overflow-y:auto}
.dash-content h2{font-size:28px;font-weight:400;margin-bottom:24px}
.dash-panel{display:none}
.dash-panel.active{display:block}

/* STAT CARDS */
.stat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;margin-bottom:32px}
.stat-card-dash{background:#fff;border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.stat-card-dash .label{font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:8px}
.stat-card-dash .num{font-family:var(--serif);font-size:32px;font-weight:400;color:var(--charcoal)}

/* TABLES */
.dash-table{width:100%;background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.dash-table table{width:100%;border-collapse:collapse}
.dash-table th{padding:14px 16px;text-align:left;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-light);background:var(--cream);border-bottom:1px solid var(--border)}
.dash-table td{padding:12px 16px;font-size:14px;border-bottom:1px solid var(--border)}
.dash-table tr:last-child td{border-bottom:none}
.status-badge{display:inline-block;padding:4px 12px;border-radius:50px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.status-badge.pending{background:#FEF3C7;color:#92400E}
.status-badge.processing{background:#DBEAFE;color:#1E40AF}
.status-badge.delivered{background:#D1FAE5;color:#065F46}
.status-badge.cancelled{background:#FEE2E2;color:#991B1B}
.status-select{padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--sans)}

/* ADD ITEM FORM */
.add-form{background:#fff;border-radius:var(--radius);padding:32px;box-shadow:var(--shadow);max-width:700px}
.add-form .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.toggle-group{display:flex;align-items:center;gap:12px}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--border);position:relative;cursor:pointer;transition:background var(--transition)}
.toggle.on{background:var(--gold)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform var(--transition);box-shadow:0 1px 4px rgba(0,0,0,.15)}
.toggle.on::after{transform:translateX(20px)}

/* CHECKOUT */
.checkout-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px}
.order-summary{background:#fff;border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.order-summary h3{font-size:20px;font-weight:500;margin-bottom:16px}
.order-summary-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.order-summary-item img{width:56px;height:56px;border-radius:8px;object-fit:cover}
.order-summary-item .info{flex:1}
.order-summary-item .info h4{font-size:14px;font-weight:500}
.order-summary-item .info .sub{font-size:12px;color:var(--text-light)}
.order-summary-item .info .price{font-size:14px;font-weight:600;color:var(--gold)}
.order-summary-total{display:flex;justify-content:space-between;padding:16px 0 0;font-size:18px;font-weight:600}
.order-summary-total span:last-child{color:var(--gold)}
.payment-card-preview{background:linear-gradient(135deg,#2A2520,#4A453E);border-radius:14px;padding:24px;color:#fff;margin-bottom:24px;aspect-ratio:1.6/1;max-width:380px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow-lg)}
.payment-card-preview .chip{width:40px;height:28px;background:linear-gradient(135deg,var(--gold-light),var(--gold));border-radius:5px}
.payment-card-preview .card-number{font-size:20px;letter-spacing:3px;font-weight:300;font-family:var(--sans)}
.payment-card-preview .card-bottom{display:flex;justify-content:space-between;align-items:flex-end}
.payment-card-preview .card-name{font-size:13px;text-transform:uppercase;letter-spacing:2px}
.payment-card-preview .card-brand{font-size:18px;font-weight:600;font-family:var(--serif);letter-spacing:2px}
.payment-form{background:#fff;border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.payment-form h3{font-size:20px;font-weight:500;margin-bottom:16px}

/* INVOICE */
.invoice-wrap{background:#fff;border-radius:var(--radius);padding:48px;box-shadow:var(--shadow);max-width:800px;margin:0 auto}
.invoice-header{display:flex;justify-content:space-between;margin-bottom:32px;padding-bottom:24px;border-bottom:2px solid var(--gold)}
.invoice-header .brand{font-family:var(--serif);font-size:28px;letter-spacing:4px;text-transform:uppercase}
.invoice-header .brand span{color:var(--gold)}
.invoice-header .info{text-align:right;font-size:13px;color:var(--text-light)}
.invoice-meta{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px}
.invoice-meta .block h4{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px}
.invoice-meta .block p{font-size:14px;margin-bottom:2px}
.invoice-table{width:100%;border-collapse:collapse;margin-bottom:24px}
.invoice-table th{padding:10px 12px;text-align:left;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-light);border-bottom:2px solid var(--border)}
.invoice-table td{padding:10px 12px;font-size:14px;border-bottom:1px solid var(--border)}
.invoice-table .total-row td{border-top:2px solid var(--charcoal);font-weight:600;font-size:16px}
.invoice-footer{text-align:center;color:var(--text-light);font-size:13px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}

/* SCROLL REVEAL */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* RESPONSIVE */
@media(max-width:900px){
.modal-body{grid-template-columns:1fr}
.about-inner{grid-template-columns:1fr}
.checkout-grid{grid-template-columns:1fr}
.footer-inner{grid-template-columns:1fr 1fr}
.dash-sidebar{width:180px}
}
@media(max-width:700px){

.dash-nav{display:flex;overflow-x:auto;gap:0}
.dash-nav a{white-space:nowrap;border-right:none !important;padding:10px 16px}
.dash-nav a.active{border-bottom:3px solid var(--gold);border-right:none}
}
@media(max-width:480px){.products-grid{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}}

@media print{
.no-print{display:none !important}
body{background:#fff}
.invoice-wrap{box-shadow:none;padding:0}
}

async function init(){
sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
auth:{autoRefreshToken:true,persistSession:true,detectSessionInUrl:false},
global:{fetch:(...args)=>fetch(...args)}
});

// auth check with 3s timeout
try{
const sessionResult = await Promise.race([
sb.auth.getSession(),
new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),3000))
]);
if(sessionResult?.data?.session){
currentUser = sessionResult.data.session.user;
const{data:prof}=await sb.from('profiles').select('*').eq('id',currentUser.id).single();
currentProfile = prof;
}
}catch(e){console.log('Auth check:',e.message)}

// Hide loader immediately
document.getElementById('appLoader').classList.add('hidden');
setTimeout(()=>{document.getElementById('appLoader').style.display='none'},600);

// Render based on state
renderApp();

// Load products in background
loadProducts();

// Listen for auth changes
sb.auth.onAuthStateChange(async(event,session)=>{
if(event==='SIGNED_IN'&&session){
currentUser=session.user;
const{data:prof}=await sb.from('profiles').select('*').eq('id',currentUser.id).single();
currentProfile=prof;
}else if(event==='SIGNED_OUT'){
currentUser=null;currentProfile=null;guestCart=[];
}
});
}

async function loadProducts(){
try{
let{data,error}=await sb.from('products').select('*').order('created_at',{ascending:true});
if(error)throw error;
if(!data||data.length===0){
const{error:insertErr}=await sb.from('products').insert(SEED_PRODUCTS);
if(insertErr)throw insertErr;
const res=await sb.from('products').select('*').order('created_at',{ascending:true});
data=res.data||[];
}
products=data;
renderProductSections();
initScrollReveal();
}catch(e){
console.error('Products load error:',e);
products=SEED_PRODUCTS.map((p,i)=>({...p,id:'local-'+i}));
renderProductSections();
initScrollReveal();
}
}

function navigate(page,data){

function renderApp(data){
const app=document.getElementById('app');
if(currentPage==='home'){app.innerHTML=renderHome();bindHome();}
else if(currentPage==='login'){app.innerHTML=renderAuth('login');bindAuth('login');}
else if(currentPage==='register'){app.innerHTML=renderAuth('register');bindAuth('register');}
else if(currentPage==='dashboard'){app.innerHTML=renderDashboard(data);bindDashboard();}

}

// ─── SCROLL REVEAL ───
function initScrollReveal(){
const observer=new IntersectionObserver((entries)=>{
entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');observer.unobserve(e.target);}});
},{threshold:0.1,rootMargin:'0px 0px -40px 0px'});
$$('.reveal').forEach(el=>{if(!el.classList.contains('visible'))observer.observe(el);});
}

function openCart(){$('#cartOverlay').classList.add('open');$('#cartDrawer').classList.add('open');renderCart();}
function closeCart(){$('#cartOverlay').classList.remove('open');$('#cartDrawer').classList.remove('open');}

async function getCartItems(){
if(!currentUser)return guestCart;
try{
const{data}=await sb.from('cart_items').select('*,products(*)').eq('user_id',currentUser.id);
return(data||[]).map(ci=>({id:ci.id,product_id:ci.product_id,qty:ci.qty,product:ci.products}));
}catch(e){return[];}
}

async function addToCart(productId){
const product=products.find(p=>p.id===productId);
if(!product)return;
if(!currentUser){
const existing=guestCart.find(c=>c.product_id===productId);
if(existing){existing.qty++;}
else{guestCart.push({id:uuid(),product_id:productId,qty:1,product});}
toast(product.name+' added to bag','gold');
updateCartCount();
return;
}
try{
const{data:existing}=await sb.from('cart_items').select('*').eq('user_id',currentUser.id).eq('product_id',productId).single();
if(existing){
await sb.from('cart_items').update({qty:existing.qty+1}).eq('id',existing.id);
}else{
await sb.from('cart_items').insert({user_id:currentUser.id,product_id:productId,qty:1});
}
toast(product.name+' added to bag','gold');
updateCartCount();
}catch(e){toast('Could not add to cart','red');}
}

async function updateCartQty(itemId,delta){
if(!currentUser){
const item=guestCart.find(c=>c.id===itemId);
if(item){item.qty=Math.max(1,item.qty+delta);}
renderCart();updateCartCount();return;
}
try{
const{data}=await sb.from('cart_items').select('*').eq('id',itemId).single();
if(data){
const newQty=Math.max(1,data.qty+delta);
await sb.from('cart_items').update({qty:newQty}).eq('id',itemId);
}
renderCart();updateCartCount();
}catch(e){}
}

async function removeCartItem(itemId){
if(!currentUser){
guestCart=guestCart.filter(c=>c.id!==itemId);
renderCart();updateCartCount();return;
}
try{
await sb.from('cart_items').delete().eq('id',itemId);
renderCart();updateCartCount();
}catch(e){}
}

async function renderCart(){
const items=await getCartItems();
const body=$('#cartBody');
const footer=$('#cartFooter');
if(!body)return;
if(items.length===0){
body.innerHTML='<div class="cart-empty">Your bag is empty</div>';
if(footer)footer.style.display='none';
return;
}
let subtotal=0;
body.innerHTML=items.map(ci=>{
const p=ci.product||products.find(pr=>pr.id===ci.product_id)||{};
const lineTotal=Number(p.price||0)*ci.qty;
subtotal+=lineTotal;
return `<div class="cart-item">
<div class="cart-item-img"><img src="${p.img_url||''}" alt="${p.name||''}"></div>
<div class="cart-item-info">
<h4>${p.name||'Product'}</h4>
<div class="material">${p.material||''}</div>
<div class="price">${formatPrice(p.price||0)}</div>
<div class="cart-item-actions">
<button class="qty-btn" onclick="updateCartQty('${ci.id}',-1)">−</button>
<span class="qty-val">${ci.qty}</span>
<button class="qty-btn" onclick="updateCartQty('${ci.id}',1)">+</button>
<button class="cart-item-remove" onclick="removeCartItem('${ci.id}')">Remove</button>
</div>
</div>
</div>`;
}).join('');
if(footer){footer.style.display='block';$('#cartSubtotal').textContent=formatPrice(subtotal);}
}

async function updateCartCount(){
let count=0;
if(!currentUser){count=guestCart.reduce((s,c)=>s+c.qty,0);}
else{
try{
const{data}=await sb.from('cart_items').select('qty').eq('user_id',currentUser.id);
count=(data||[]).reduce((s,c)=>s+c.qty,0);
}catch(e){}
}
const badge=$('#cartCount');
if(badge){badge.textContent=count;badge.classList.toggle('show',count>0);}
}

function closeProductModal(){$('#productModal').classList.remove('open');document.body.style.overflow='';}
let modalQtyVal=1;
function modalQtyChange(d){modalQtyVal=Math.max(1,modalQtyVal+d);const el=$('#modalQty');if(el)el.textContent=modalQtyVal;}
async function addToCartModal(pid){
for(let i=0;i<modalQtyVal;i++)await addToCart(pid);
modalQtyVal=1;
const el=$('#modalQty');if(el)el.textContent=1;
}

let reviewStars=0;
function setReviewStars(n){
reviewStars=n;
$$('#starPicker button').forEach(b=>{
b.classList.toggle('active',parseInt(b.dataset.star)<=n);
});
}

async function submitReview(productId){
if(!reviewStars){toast('Please select a star rating','red');return;}
const text=$('#reviewText')?.value||'';
if(!text.trim()){toast('Please write a review','red');return;}
try{
// Check if user has ordered this product (verified purchase)
let verified=false;
const{data:orderItems}=await sb.from('order_items').select('*,orders!inner(user_id)').eq('orders.user_id',currentUser.id).eq('product_id',productId);
if(orderItems&&orderItems.length>0)verified=true;
await sb.from('reviews').insert({
product_id:productId,
user_id:currentUser.id,
reviewer_name:(currentProfile?.first_name||'')+' '+(currentProfile?.last_name||''),
stars:reviewStars,
review_text:text,
verified
});
toast('Review submitted!','gold');
reviewStars=0;
openProductModal(productId);
}catch(e){toast('Could not submit review','red');}
}

function bindAuth(type){
const btn=$('#authSubmit');
if(!btn)return;
btn.addEventListener('click',async()=>{
const email=$('#authEmail').value.trim();
const pass=$('#authPass').value;
const errEl=$('#authError');
errEl.style.display='none';
if(!email||!pass){errEl.textContent='Please fill in all fields.';errEl.style.display='block';return;}
btn.disabled=true;btn.textContent='Please wait...';
try{
if(type==='login'){
const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
if(error)throw error;
currentUser=data.user;
const{data:prof}=await sb.from('profiles').select('*').eq('id',currentUser.id).single();
currentProfile=prof;
// Merge guest cart
for(const item of guestCart){
try{
const{data:existing}=await sb.from('cart_items').select('*').eq('user_id',currentUser.id).eq('product_id',item.product_id).maybeSingle();
if(existing){await sb.from('cart_items').update({qty:existing.qty+item.qty}).eq('id',existing.id);}
else{await sb.from('cart_items').insert({user_id:currentUser.id,product_id:item.product_id,qty:item.qty});}
}catch(e){}
}
guestCart=[];
toast('Welcome back, '+(currentProfile?.first_name||'')+'!','gold');
navigate(currentProfile?.role==='admin'?'admin':'dashboard');
}else{
const first=$('#regFirst').value.trim();
const last=$('#regLast').value.trim();
if(!first||!last){errEl.textContent='Please enter your name.';errEl.style.display='block';btn.disabled=false;btn.textContent='Create Account';return;}
if(pass.length<6){errEl.textContent='Password must be at least 6 characters.';errEl.style.display='block';btn.disabled=false;btn.textContent='Create Account';return;}
const{data,error}=await sb.auth.signUp({email,password:pass});
if(error)throw error;
if(data.user){
await sb.from('profiles').insert({id:data.user.id,first_name:first,last_name:last,role:'user'});
currentUser=data.user;
currentProfile={id:data.user.id,first_name:first,last_name:last,role:'user'};
toast('Account created! Welcome, '+first+'!','gold');
navigate('dashboard');
}
}
}catch(e){
errEl.textContent=e.message||'Something went wrong.';errEl.style.display='block';
btn.disabled=false;btn.textContent=type==='login'?'Sign In':'Create Account';
}
});
}

currentUser=null;currentProfile=null;guestCart=[];
toast('Logged out');navigate('home');
}

function updateCardPreview(){
const name=$('#cardName');const num=$('#cardNum');
if($('#previewCardName'))$('#previewCardName').textContent=(name?.value||'YOUR NAME').toUpperCase();
if($('#previewCardNum'))$('#previewCardNum').textContent=num?.value||'•••• •••• •••• ••••';
}

function formatCardNum(){
const el=$('#cardNum');if(!el)return;
let v=el.value.replace(/\D/g,'');
let formatted='';
for(let i=0;i<v.length&&i<16;i++){if(i>0&&i%4===0)formatted+=' ';formatted+=v[i];}
el.value=formatted;
}

async function placeOrder(){
if(!currentUser)return;
const name=$('#cardName')?.value;const num=$('#cardNum')?.value;const exp=$('#cardExp')?.value;const cvc=$('#cardCvc')?.value;
if(!name||!num||!exp||!cvc){toast('Please fill in all payment details','red');return;}
try{
const items=await getCartItems();
if(items.length===0){toast('Cart is empty','red');return;}
let total=0;
const orderItems=items.map(ci=>{
const p=ci.product||{};const lineTotal=Number(p.price||0)*ci.qty;total+=lineTotal;
return{product_id:ci.product_id,qty:ci.qty,price:Number(p.price||0)};
});
const{data:order,error:oErr}=await sb.from('orders').insert({user_id:currentUser.id,total,status:'processing'}).select().single();
if(oErr)throw oErr;
const oiData=orderItems.map(oi=>({...oi,order_id:order.id}));
const{error:oiErr}=await sb.from('order_items').insert(oiData);
if(oiErr)throw oiErr;
await sb.from('cart_items').delete().eq('user_id',currentUser.id);
toast('Order placed successfully!','gold');
switchDashPanel('orders');
}catch(e){toast('Error placing order: '+(e.message||''),'red');}
}

<!--
═══════════════════════════════════════════════════
  SUPABASE SQL — Run this in your Supabase SQL Editor
═══════════════════════════════════════════════════

-- 1) Profiles
CREATE TABLE IF NOT EXISTS profiles (
  id UUID PRIMARY KEY REFERENCES auth.users(id) ON DELETE CASCADE,
  first_name TEXT,
  last_name TEXT,
  role TEXT DEFAULT 'user',
  created_at TIMESTAMPTZ DEFAULT now()
);

ALTER TABLE profiles ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Users can read own profile" ON profiles FOR SELECT USING (auth.uid() = id);
CREATE POLICY "Users can update own profile" ON profiles FOR UPDATE USING (auth.uid() = id);
CREATE POLICY "Users can insert own profile" ON profiles FOR INSERT WITH CHECK (auth.uid() = id);

-- 2) Products
CREATE TABLE IF NOT EXISTS products (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  name TEXT NOT NULL,
  category TEXT,
  material TEXT,
  price NUMERIC DEFAULT 0,
  badge TEXT,
  img_url TEXT,
  description TEXT,
  weight TEXT,
  dimensions TEXT,
  in_stock BOOLEAN DEFAULT true,
  created_at TIMESTAMPTZ DEFAULT now()
);

ALTER TABLE products DISABLE ROW LEVEL SECURITY;

-- Public read access
CREATE POLICY "Anyone can read products" ON products FOR SELECT USING (true);
CREATE POLICY "Authenticated users can insert products" ON products FOR INSERT WITH CHECK (auth.uid() IS NOT NULL);
CREATE POLICY "Authenticated users can delete products" ON products FOR DELETE USING (auth.uid() IS NOT NULL);
CREATE POLICY "Authenticated users can update products" ON products FOR UPDATE USING (auth.uid() IS NOT NULL);

-- 3) Cart Items
CREATE TABLE IF NOT EXISTS cart_items (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  user_id UUID REFERENCES auth.users(id) ON DELETE CASCADE,
  product_id UUID REFERENCES products(id) ON DELETE CASCADE,
  qty INTEGER DEFAULT 1,
  UNIQUE(user_id, product_id)
);

ALTER TABLE cart_items ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Users can manage own cart" ON cart_items FOR ALL USING (auth.uid() = user_id);

-- 4) Orders
CREATE TABLE IF NOT EXISTS orders (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  user_id UUID REFERENCES auth.users(id) ON DELETE CASCADE,
  total NUMERIC DEFAULT 0,
  status TEXT DEFAULT 'processing',
  created_at TIMESTAMPTZ DEFAULT now()
);

ALTER TABLE orders ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Users can read own orders" ON orders FOR SELECT USING (auth.uid() = user_id);
CREATE POLICY "Users can insert own orders" ON orders FOR INSERT WITH CHECK (auth.uid() = user_id);
-- Admin: read all orders (add a broader policy for admin role)
CREATE POLICY "Admin can read all orders" ON orders FOR SELECT USING (
  EXISTS (SELECT 1 FROM profiles WHERE id = auth.uid() AND role = 'admin')
);
CREATE POLICY "Admin can update all orders" ON orders FOR UPDATE USING (
  EXISTS (SELECT 1 FROM profiles WHERE id = auth.uid() AND role = 'admin')
);

-- 5) Order Items
CREATE TABLE IF NOT EXISTS order_items (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  order_id UUID REFERENCES orders(id) ON DELETE CASCADE,
  product_id UUID REFERENCES products(id) ON DELETE SET NULL,
  qty INTEGER DEFAULT 1,
  price NUMERIC DEFAULT 0
);

ALTER TABLE order_items ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Users can read own order items" ON order_items FOR SELECT USING (
  EXISTS (SELECT 1 FROM orders WHERE orders.id = order_items.order_id AND orders.user_id = auth.uid())
);
CREATE POLICY "Users can insert own order items" ON order_items FOR INSERT WITH CHECK (
  EXISTS (SELECT 1 FROM orders WHERE orders.id = order_items.order_id AND orders.user_id = auth.uid())
);
CREATE POLICY "Admin can read all order items" ON order_items FOR SELECT USING (
  EXISTS (SELECT 1 FROM profiles WHERE id = auth.uid() AND role = 'admin')
);

-- 6) Reviews
CREATE TABLE IF NOT EXISTS reviews (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  product_id UUID REFERENCES products(id) ON DELETE CASCADE,
  user_id UUID REFERENCES auth.users(id) ON DELETE CASCADE,
  reviewer_name TEXT,
  stars INTEGER CHECK (stars >= 1 AND stars <= 5),
  review_text TEXT,
  verified BOOLEAN DEFAULT false,
  created_at TIMESTAMPTZ DEFAULT now()
);

ALTER TABLE reviews DISABLE ROW LEVEL SECURITY;

CREATE POLICY "Anyone can read reviews" ON reviews FOR SELECT USING (true);
CREATE POLICY "Authenticated users can insert reviews" ON reviews FOR INSERT WITH CHECK (auth.uid() = user_id);
